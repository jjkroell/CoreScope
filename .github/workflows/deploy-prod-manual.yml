name: Deploy Production (Manual)

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" | tr -d '\r' > ~/.ssh/prod_deploy_key
          chmod 600 ~/.ssh/prod_deploy_key
          ssh-keygen -l -f ~/.ssh/prod_deploy_key
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          ssh -i ~/.ssh/prod_deploy_key \
              "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
              'set -e
               cd ~/CoreScope
               git pull origin master
               docker build -t corescope:latest .
               docker compose up -d --force-recreate master
               echo "Production deploy complete: $(git rev-parse --short HEAD)"'

      - name: Post deployment summary
        run: |
          echo "## Production Deployed ✓" >> $GITHUB_STEP_SUMMARY
          echo "**Host:** ${{ secrets.PROD_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
